naftiko: 1.0.0-alpha2
info:
  label: Princess Beef Heavy Industries pb33f Giftshop API
  description: Want some cool gear, to go with your cool code? We've got you covered. Buy a t-shirt, hoodie or other merchandise
    from our store to show your support for pb33f.
  tags:
  - Princess
  - Beef
  - Heavy
  - Industries
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
