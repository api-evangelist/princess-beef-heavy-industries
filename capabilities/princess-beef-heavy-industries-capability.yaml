    namespace: princess-beef-heavy-industries
    baseUri: https://api.pb33f.io/wiretap/giftshop
    description: Princess Beef Heavy Industries pb33f Giftshop API HTTP API.
    authentication:
      type: apikey
      in: header
      name: X-API-Key
      value: '{{PRINCESS_BEEF_HEAVY_INDUSTRIES_TOKEN}}'
    resources:
    - name: products
      path: /products
      operations:
      - name: createproduct
        method: POST
        description: Princess Beef Heavy Industries Create a new product.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getallproducts
        method: GET
        description: Princess Beef Heavy Industries Get a list of all products.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: products-id
      path: /products/{id}
      operations:
      - name: getproductbyid
        method: GET
        description: Princess Beef Heavy Industries Get a product by its `id` or `shortCode`
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteproduct
        method: DELETE
        description: Princess Beef Heavy Industries Remove a product
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateproductbyid
        method: POST
        description: Princess Beef Heavy Industries Update a product
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: search
      path: /search
      operations:
      - name: searchproducts
        method: GET
        description: Princess Beef Heavy Industries Search products.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
